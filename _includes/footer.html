{% include base_path %}

<style>
  .page__footer {
    margin-top: 48px;
    padding: 0 !important;
    background: #ffffff !important;
    border-top: none !important;
  }

  .page__footer footer {
    max-width: 100% !important;
    padding: 0 !important;
  }

  .site-footer-custom {
    width: 100%;
    padding: 36px 20px 28px;
    background: #ffffff;
    color: #4b5563;
    text-align: center;
    font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  .site-footer-inner {
    max-width: 960px;
    margin: 0 auto;
  }

  .footer-friends {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.9;
    letter-spacing: 0.2px;
    margin-bottom: 16px;
    color: #4b5563;
  }

  .footer-friends-label {
    font-weight: 700;
    color: #374151;
    margin-right: 8px;
  }

  .footer-friends a {
    color: #4b5563;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .footer-friends a:hover {
    color: #111827;
    text-decoration: underline;
  }

  .footer-divider {
    width: 100%;
    max-width: 760px;
    margin: 0 auto 18px;
    border: 0;
    border-top: 1px solid #e5e7eb;
  }

  .page__footer-copyright {
    font-size: 14px;
    line-height: 1.9;
    color: #6b7280;
  }

  .site-stats {
    margin-top: 12px;
    font-size: 13px;
    color: #6b7280;
    letter-spacing: 0.2px;
  }

  .site-stats span {
    white-space: nowrap;
  }

  @media (max-width: 768px) {
    .site-footer-custom {
      padding: 28px 16px 22px;
    }

    .footer-friends {
      font-size: 14px;
      line-height: 2;
    }

    .page__footer-copyright {
      font-size: 13px;
    }

    .site-stats {
      font-size: 12px;
      line-height: 1.8;
    }
  }
</style>

<div class="site-footer-custom">
  <div class="site-footer-inner">
    <div class="footer-friends">
      <span class="footer-friends-label">友情链接：</span>
      <a href="https://lcdgith.github.io/homepage/" target="_blank" rel="noopener noreferrer">Ph.D. Chundong Li</a>
      <span style="margin: 0 10px; color: #9ca3af;">·</span>
      <a href="https://pengwen-pw.github.io/portfolio/" target="_blank" rel="noopener noreferrer">M.A. Wen Peng</a>
    </div>

    <hr class="footer-divider" />

    <div class="page__footer-copyright">
      &copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}. All Rights Reserved.<br />
      Site last updated {{ "now" | date: '%Y-%m-%d' }}
    </div>

    <div class="site-stats">
      <span id="busuanzi_container_site_pv">
        总访问量：<span id="busuanzi_value_site_pv"></span>
      </span>
      <span style="margin: 0 10px; color: #9ca3af;">|</span>
      <span id="busuanzi_container_site_uv">
        访客数：<span id="busuanzi_value_site_uv"></span>
      </span>
    </div>
  </div>
</div>

<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
