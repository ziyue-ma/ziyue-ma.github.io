<style>
.academic-timeline {
  margin: 42px 0 56px;
}

.academic-timeline-title {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 34px;
  color: #2563eb;
  font-size: 30px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: 1px;
}

.academic-title-icon {
  width: 38px;
  height: 38px;
  flex: 0 0 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.academic-title-icon svg {
  width: 38px;
  height: 38px;
  display: block;
}

.timeline-line {
  position: relative;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.timeline-line::before {
  content: "";
  position: absolute;
  top: 34px;
  left: 12%;
  right: 12%;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, #2563eb, #06b6d4, #2563eb);
  z-index: 0;
}

.timeline-item {
  position: relative;
  z-index: 1;
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  animation: cardIn 0.7s ease forwards;
}

.timeline-item:nth-child(1) {
  animation-delay: 0.1s;
}

.timeline-item:nth-child(2) {
  animation-delay: 0.3s;
}

.timeline-item:nth-child(3) {
  animation-delay: 0.5s;
}

.timeline-dot {
  width: 28px;
  height: 28px;
  margin: 20px auto 22px;
  border-radius: 50%;
  background: #ffffff;
  border: 7px solid #2563eb;
  box-shadow: 0 0 0 9px rgba(37, 99, 235, 0.13);
  transition: all 0.3s ease;
}

.timeline-card {
  min-height: 190px;
  padding: 24px 20px;
  border-radius: 22px;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  transition: all 0.3s ease;
}

.timeline-item:hover .timeline-card {
  transform: translateY(-8px);
  box-shadow: 0 20px 42px rgba(15, 23, 42, 0.14);
}

.timeline-item:hover .timeline-dot {
  transform: scale(1.15);
  border-color: #06b6d4;
  box-shadow: 0 0 0 12px rgba(6, 182, 212, 0.15);
}

.timeline-logo {
  width: 58px;
  height: 58px;
  object-fit: contain;
  padding: 7px;
  border-radius: 16px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  margin-bottom: 14px;
}

.timeline-year {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  color: #2563eb;
  background: #eff6ff;
  border-radius: 999px;
  padding: 5px 12px;
  margin-bottom: 12px;
}

.timeline-degree {
  font-size: 20px;
  font-weight: 800;
  color: #1f2937;
  margin-bottom: 8px;
}

.timeline-school {
  font-size: 15px;
  line-height: 1.6;
  color: #475569;
}

@keyframes cardIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .timeline-line {
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .timeline-line::before {
    top: 0;
    bottom: 0;
    left: 14px;
    right: auto;
    width: 4px;
    height: auto;
  }

  .timeline-item {
    text-align: left;
    padding-left: 42px;
  }

  .timeline-dot {
    position: absolute;
    left: 0;
    top: 22px;
    margin: 0;
  }

  .timeline-card {
    min-height: auto;
  }
}
</style>

<section class="academic-timeline">

  <h2 class="academic-timeline-title">
    <span class="academic-title-icon" aria-hidden="true">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path fill="#2563eb" d="M32 10 4 24l28 14 28-14L32 10Z"/>
        <path fill="#2563eb" d="M14 31v9c0 5.5 8.1 10 18 10s18-4.5 18-10v-9L32 40 14 31Z"/>
        <path fill="#2563eb" d="M54 28v14c0 1.1.9 2 2 2s2-.9 2-2V26l-4 2Z"/>
        <circle cx="56" cy="47" r="3" fill="#2563eb"/>
      </svg>
    </span>
    <span>教育经历</span>
  </h2>

  <div class="timeline-line">

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-card">
        <img class="timeline-logo" src="/images/hbu.jpg" alt="Hebei University logo">
        <div class="timeline-year">2019 - 2023</div>
        <div class="timeline-degree">学士</div>
        <div class="timeline-school">河北大学 · 管理学院</div>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-card">
        <img class="timeline-logo" src="/images/cas.jpg" alt="Chinese Academy of Sciences logo">
        <div class="timeline-year">2023 - 2026</div>
        <div class="timeline-degree">硕士研究生</div>
        <div class="timeline-school">中国科学院文献情报中心</div>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-card">
        <img class="timeline-logo" src="/images/whu.jpg" alt="Wuhan University logo">
        <div class="timeline-year">2026 - Present</div>
        <div class="timeline-degree">博士研究生</div>
        <div class="timeline-school">武汉大学 · 信息管理学院</div>
      </div>
    </div>

  </div>

</section>
